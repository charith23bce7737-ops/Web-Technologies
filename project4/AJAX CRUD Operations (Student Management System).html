<!DOCTYPE html>
<html>
<head><title>Student System</title></head>
<body>
    <h2>Student Management</h2>
    <input type="text" id="sid" placeholder="ID">
    <input type="text" id="sname" placeholder="Name">
    <input type="text" id="sdept" placeholder="Dept">
    <input type="number" id="smarks" placeholder="Marks">
    <button onclick="addStudent()">Add Student</button>

    <table border="1" id="stTable" style="margin-top: 20px; width: 100%;">
        <thead><tr><th>ID</th><th>Name</th><th>Dept</th><th>Marks</th><th>Actions</th></tr></thead>
        <tbody></tbody>
    </table>

    <script>
        let students = [];

        function render() {
            const tbody = document.querySelector("#stTable tbody");
            tbody.innerHTML = students.map((s, i) => `
                <tr>
                    <td>${s.id}</td><td>${s.name}</td><td>${s.dept}</td><td>${s.marks}</td>
                    <td>
                        <button onclick="updateMarks(${i})">Edit</button>
                        <button onclick="deleteStudent(${i})">Delete</button>
                    </td>
                </tr>`).join('');
        }

        function addStudent() {
            const student = {
                id: document.getElementById('sid').value,
                name: document.getElementById('sname').value,
                dept: document.getElementById('sdept').value,
                marks: document.getElementById('smarks').value
            };
            students.push(student);
            render();
        }

        function deleteStudent(index) {
            students.splice(index, 1);
            render();
        }

        function updateMarks(index) {
            const m = prompt("Enter new marks:", students[index].marks);
            if(m) { students[index].marks = m; render(); }
        }
    </script>
</body>
</html>
