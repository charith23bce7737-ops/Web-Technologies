<!DOCTYPE html>
<html>
<head>
    <title>Student Marks Calculator</title>
    <style>
        body {
            font-family: Arial;
            margin: 20px;
        }
        input {
            margin: 5px;
            padding: 5px;
        }
        button {
            margin-top: 10px;
            padding: 6px 12px;
        }
        #output {
            margin-top: 20px;
            font-weight: arial;
        }
    </style>
</head>

<body>

<h2>Student Marks Calculator</h2>

<input id="name" placeholder="Enter Student Name"><br>
<input id="m1" placeholder="Enter Mark 1" type="number"><br>
<input id="m2" placeholder="Enter Mark 2" type="number"><br>
<input id="m3" placeholder="Enter Mark 3" type="number"><br>

<button onclick="calculate()">Calculate</button>

<div id="output"></div>

<script>

// Arrow functions
const calculateTotal = (m1, m2, m3) => m1 + m2 + m3;
const calculateAverage = (m1, m2, m3) => (m1 + m2 + m3) / 3;

function calculate() {

    let studentName = document.getElementById("name").value;

    let mark1 = Number(document.getElementById("m1").value);
    let mark2 = Number(document.getElementById("m2").value);
    let mark3 = Number(document.getElementById("m3").value);

    let total = calculateTotal(mark1, mark2, mark3);
    let average = calculateAverage(mark1, mark2, mark3);

    document.getElementById("output").innerHTML = `
        Student Name: ${studentName} <br>
        Average Marks: ${average.toFixed(2)}
    `;
}

</script>

</body>
</html>
