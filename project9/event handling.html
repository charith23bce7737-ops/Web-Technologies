<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>React Counter App</title>

  <!-- React CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #eef2f7;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 5px 12px rgba(0,0,0,0.1);
      width: 300px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .count {
      font-size: 40px;
      margin: 20px 0;
      color: #2c3e50;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .inc {
      background-color: #28a745;
      color: white;
    }

    .dec {
      background-color: #dc3545;
      color: white;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">

    // Functional Component
    function Counter() {

      // useState Hook (State Initialization)
      const [count, setCount] = React.useState(0);

      // Increment Function
      const increment = () => {
        setCount(count + 1);
      };

      // Decrement Function
      const decrement = () => {
        setCount(count - 1);
      };

      // JSX UI
      return (
        <div className="container">
          <h1>Counter App</h1>

          <div className="count">{count}</div>

          <button className="inc" onClick={increment}>
            Increment
          </button>

          <button className="dec" onClick={decrement}>
            Decrement
          </button>
        </div>
      );
    }

    // Root Component
    function App() {
      return (
        <div>
          <Counter />
        </div>
      );
    }

    // Render to DOM
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);

  </script>
</body>
</html>
