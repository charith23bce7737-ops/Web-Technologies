<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>React Dynamic List</title>

  <!-- React CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f6f8;
      display: flex;
      justify-content: center;
      padding-top: 50px;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 350px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
    }

    input {
      width: 70%;
      padding: 8px;
      margin-right: 5px;
    }

    button {
      padding: 8px 10px;
      cursor: pointer;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 15px;
    }

    li {
      display: flex;
      justify-content: space-between;
      background: #eef2f7;
      padding: 8px;
      margin-bottom: 5px;
      border-radius: 5px;
    }

    .empty {
      text-align: center;
      color: #888;
      margin-top: 15px;
    }

    .delete-btn {
      background: #dc3545;
      color: white;
      border: none;
      border-radius: 4px;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">

    // Child Component (List Display)
    function ItemList({ items, removeItem }) {
      return (
        <ul>
          {items.map((item) => (
            <li key={item.id}>
              {item.text}
              <button 
                className="delete-btn"
                onClick={() => removeItem(item.id)}
              >
                Remove
              </button>
            </li>
          ))}
        </ul>
      );
    }

    // Parent Component
    function App() {

      const [items, setItems] = React.useState([]);
      const [input, setInput] = React.useState("");

      // Add Item
      const addItem = () => {
        if (input.trim() === "") return;

        const newItem = {
          id: Date.now(),   // unique key
          text: input
        };

        setItems([...items, newItem]);
        setInput("");
      };

      // Remove Item
      const removeItem = (id) => {
        const updatedList = items.filter(item => item.id !== id);
        setItems(updatedList);
      };

      return (
        <div className="container">
          <h2>Item List</h2>

          {/* Input Section */}
          <div>
            <input
              type="text"
              placeholder="Enter item"
              value={input}
              onChange={(e) => setInput(e.target.value)}
            />
            <button onClick={addItem}>Add</button>
          </div>

          {/* Conditional Rendering */}
          {items.length === 0 ? (
            <div className="empty">No items available</div>
          ) : (
            <ItemList items={items} removeItem={removeItem} />
          )}
        </div>
      );
    }

    // Render App
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);

  </script>
</body>
</html>
